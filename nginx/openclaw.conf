map $http_upgrade $is_websocket {
    default 0;
    websocket 1;
}

server {
    server_name zhangyangbin.com;
    client_max_body_size 100m;

    # Internal auth subrequest (used by auth_request)
    location = /_internal_auth {
        internal;
        proxy_pass http://127.0.0.1:7683/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    # Internal demo auth subrequest
    location = /_internal_demo_auth {
        internal;
        proxy_pass http://127.0.0.1:7683/auth/demo-verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    # Login page (public)
    location = /login {
        root /var/www/chat;
        try_files /login.html =404;
    }

    # Demo login page (public)
    location = /demos/login {
        root /var/www/chat;
        try_files /demo-login.html =404;
    }

    # Auth API (public)
    location /auth/ {
        proxy_pass http://127.0.0.1:7683/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # 401 → login redirect
    error_page 401 = @login_redirect;
    location @login_redirect {
        return 302 /login;
    }

    location @gateway_ws {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        if ($is_websocket) {
            rewrite ^ /____ws_gateway last;
        }
        auth_request /_internal_auth;
        root /var/www/chat;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /____ws_gateway {
        internal;
        proxy_pass http://127.0.0.1:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location /v1/responses {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:18789/v1/responses;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer 17043bad6b19491dfa222d681d43584fbc3e8dd3781edfbc";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:18789/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location /terminal {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/chats {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7682/api/chats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /agents {
        auth_request /_internal_auth;
        root /var/www/chat;
        try_files /agents.html /agents.html;
    }

    location /api/agents/ {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7685/api/agents/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/usage/ {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7686/api/usage;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }


    location /api/nodes/ {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7682/api/nodes/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/devices/ {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7682/api/devices/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/gateway/ {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7682/api/gateway/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/finance/ {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7684/api/finance/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }


    location = /finance {
        auth_request /_internal_auth;
        root /var/www/chat;
        try_files /finance.html =404;
    }

    location /api/files/ {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:7682/api/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /dashboard/ {
        auth_request /_internal_auth;
        proxy_pass http://127.0.0.1:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # === Demos section (access code auth) ===
    location /demos/village/api/ {
        auth_request /_internal_demo_auth;
        error_page 401 = @demo_login_redirect;
        proxy_pass http://127.0.0.1:3100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /demos/village/ {
        auth_request /_internal_demo_auth;
        error_page 401 = @demo_login_redirect;
        alias /home/nikefd/agent-village/;
        index index.html;
        
    }

    location @demo_login_redirect {
        return 302 /demos/login?next=$request_uri;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/zhangyangbin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhangyangbin.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = zhangyangbin.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name zhangyangbin.com;
    client_max_body_size 100m;
    return 404;
}
