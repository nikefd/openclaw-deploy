<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股金融Agent</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f7;--card:#fff;--text:#1a1a2e;--sub:#6c757d;--border:#e5e5ea;--accent:#4361ee;--up:#e63946;--down:#2ec4b6;--hover:#f0f0f5;--radius:14px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* NAV */
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-left a{font-size:14px;color:var(--sub)}
.nav-left h1{font-size:20px;font-weight:700}
.nav-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.status-dot{width:8px;height:8px;border-radius:50%;background:#2ec4b6;display:inline-block}
.status-dot.error{background:var(--up)}
#lastUpdate{font-size:12px;color:var(--sub)}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;font-family:var(--font);transition:all .2s}
.btn:hover{background:var(--hover)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* TABS */
.tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:14px 20px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--sub);transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab:hover{color:var(--text);background:var(--hover)}

/* CONTENT */
.content{max-width:1200px;margin:0 auto;padding:20px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-label{font-size:12px;color:var(--sub);margin-bottom:6px}
.card-value{font-size:24px;font-weight:700}
.card-value.up{color:var(--up)}.card-value.down{color:var(--down)}

/* CHART AREA */
.chart-row{display:grid;grid-template-columns:1fr 280px;gap:16px;margin-bottom:24px}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.chart-box h3{font-size:14px;margin-bottom:12px;color:var(--sub)}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center}
#gaugeLabel{font-size:14px;color:var(--sub);margin-top:-30px}
#gaugeScore{font-size:36px;font-weight:700;margin-top:4px}

/* TABLE */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tbl-wrap h3{padding:16px 20px 0;font-size:14px;color:var(--sub)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);color:var(--sub);font-weight:500;font-size:12px}
td{padding:12px 16px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover{background:var(--hover)}

/* ANALYSIS */
.analysis-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.analysis-card h3{margin-bottom:12px}
.md-content{line-height:1.8;color:var(--text)}
.md-content h1,.md-content h2,.md-content h3{margin:16px 0 8px}
.md-content ul,.md-content ol{padding-left:20px}
.md-content code{background:var(--hover);padding:2px 6px;border-radius:4px;font-size:13px}
.md-content pre{background:#1a1a2e;color:#e0e0e0;padding:16px;border-radius:8px;overflow-x:auto}
.md-content pre code{background:none;color:inherit}
.pick-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.pick-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.pick-card .name{font-size:16px;font-weight:600}
.pick-card .symbol{color:var(--sub);font-size:13px}
.pick-card .conf{display:inline-block;background:var(--accent);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;margin-left:8px}
.pick-card .prices{display:flex;gap:16px;margin-top:12px;font-size:13px}
.pick-card .prices span{display:flex;flex-direction:column}
.pick-card .prices .lbl{font-size:11px;color:var(--sub)}
.pick-card .reason{margin-top:12px;font-size:13px;color:var(--sub);line-height:1.6}

/* FILTERS */
.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--card)}

/* REPORTS */
.report-list{display:grid;gap:8px}
.report-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.report-item:hover{background:var(--hover);border-color:var(--accent)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);width:90%;max-width:800px;max-height:85vh;overflow:auto;padding:32px;position:relative}
.modal-close{position:absolute;top:12px;right:16px;font-size:24px;cursor:pointer;color:var(--sub);background:none;border:none}

/* LOG PANEL */
.log-panel{display:none;position:fixed;bottom:0;left:0;right:0;height:300px;background:#1a1a2e;border-top:2px solid var(--accent);z-index:150;flex-direction:column}
.log-panel.show{display:flex}
.log-header{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;color:#aaa;font-size:13px}
.log-header button{background:none;border:none;color:#aaa;cursor:pointer;font-size:18px}
.log-body{flex:1;overflow-y:auto;padding:0 16px 16px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:12px;color:#4ade80;white-space:pre-wrap;line-height:1.6}

/* NEWS */
.news-placeholder{text-align:center;padding:60px;color:var(--sub)}

/* RESPONSIVE */
@media(max-width:768px){
  .chart-row{grid-template-columns:1fr}
  .cards{grid-template-columns:repeat(2,1fr)}
  .nav{padding:10px 16px}
  .content{padding:16px}
  .nav-left h1{font-size:16px}
  .tab{padding:12px 14px;font-size:13px}
}
@media(max-width:480px){
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="/">← 主页</a>
    <h1>📈 A股金融Agent</h1>
  </div>
  <div class="nav-right">
    <span class="status-dot" id="statusDot"></span>
    <span id="lastUpdate">--</span>
    <button class="btn" onclick="refreshAll()">🔄 刷新</button>
    <button class="btn btn-primary" id="runBtn" onclick="runAnalysis()">▶ 运行分析</button>
  </div>
</nav>

<div class="tabs">
  <div class="tab active" data-tab="dashboard">📊 仪表盘</div>
  <div class="tab" data-tab="analysis">🤖 AI研判</div>
  <div class="tab" data-tab="news">📰 新闻资讯</div>
  <div class="tab" data-tab="trades">📈 交易记录</div>
  <div class="tab" data-tab="reports">📋 日报</div>
  <div class="tab" data-tab="changelog">🔄 更新日志</div>
</div>

<div class="content">
  <!-- DASHBOARD -->
  <div class="tab-panel active" id="panel-dashboard">
    <div class="cards" id="summaryCards"></div>
    <div class="chart-row">
      <div class="chart-box">
        <h3>收益曲线</h3>
        <canvas id="returnChart"></canvas>
      </div>
      <div class="chart-box gauge-wrap">
        <h3 style="align-self:flex-start;width:100%">市场情绪</h3>
        <canvas id="gaugeChart" style="max-width:220px"></canvas>
        <div id="gaugeScore">--</div>
        <div id="gaugeLabel">--</div>
      </div>
    </div>
    <div class="tbl-wrap">
      <h3>持仓明细</h3>
      <div style="overflow-x:auto">
        <table><thead><tr><th>股票</th><th>代码</th><th>数量</th><th>成本价</th><th>现价</th><th>盈亏</th><th>盈亏%</th></tr></thead><tbody id="posBody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- ANALYSIS -->
  <div class="tab-panel" id="panel-analysis">
    <div class="analysis-card">
      <h3>📅 市场分析 <span id="analysisDate" style="font-size:13px;color:var(--sub)"></span></h3>
      <div class="md-content" id="marketAnalysis"></div>
    </div>
    <h3 style="margin-bottom:12px">🎯 AI选股</h3>
    <div class="pick-cards" id="pickCards"></div>
  </div>

  <!-- NEWS -->
  <div class="tab-panel" id="panel-news">
    <div class="section">
      <div class="section-title">📰 最新财经资讯</div>
      <div id="newsList"><div class="empty">加载中...</div></div>
    </div>
  </div>
  </div>

  <!-- TRADES -->
  <div class="tab-panel" id="panel-trades">
    <div class="filters">
      <select id="filterDir"><option value="">全部方向</option><option value="BUY">买入</option><option value="SELL">卖出</option></select>
      <input type="date" id="filterDate">
      <button class="btn" onclick="renderTrades()">筛选</button>
    </div>
    <div class="tbl-wrap">
      <div style="overflow-x:auto">
        <table><thead><tr><th>日期</th><th>方向</th><th>股票</th><th>代码</th><th>价格</th><th>数量</th><th>金额</th><th>佣金</th><th>原因</th></tr></thead><tbody id="tradeBody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- REPORTS -->
  <div class="tab-panel" id="panel-reports">
    <div class="report-list" id="reportList"></div>
  </div>
  <div class="tab-panel" id="panel-changelog">
    <div class="section">
      <div class="section-title">🔄 自动优化更新日志</div>
      <div class="md-content" id="changelogContent" style="line-height:1.8">加载中...</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="md-content" id="modalContent"></div>
  </div>
</div>

<!-- LOG PANEL -->
<div class="log-panel" id="logPanel">
  <div class="log-header"><span>🖥 运行日志</span><button onclick="closeLog()">✕</button></div>
  <div class="log-body" id="logBody"></div>
</div>

<script>
// State
let dashData=null, tradesData=[], chartInst=null, gaugeInst=null, pollTimer=null;

// Tabs
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-'+t.dataset.tab).classList.add('active');
  if(t.dataset.tab==='news')loadNews();
  if(t.dataset.tab==='changelog')loadChangelog();
}));

// Helpers
const fmt=n=>n==null?'--':Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
const pnlClass=v=>v>0?'up':v<0?'down':'';
const pnlSign=v=>v>0?'+':'';

async function api(url,opts){
  try{const r=await fetch(url,opts);if(!r.ok)throw r;return await r.json();}
  catch(e){console.error(url,e);return null;}
}

// Dashboard
async function loadDashboard(){
  const d=await api('/api/finance/dashboard');
  if(!d)return;
  dashData=d;
  const a=d.account||{};
  const posValue=a.total_value-a.cash;
  const cards=[
    {label:'总资产',value:fmt(a.total_value)},
    {label:'可用现金',value:fmt(a.cash)},
    {label:'持仓市值',value:fmt(posValue)},
    {label:'总收益率',value:pnlSign(d.total_return_pct)+fmt(d.total_return_pct)+'%',cls:pnlClass(d.total_return_pct)},
    {label:'今日盈亏',value:pnlSign(d.today_pnl)+fmt(d.today_pnl),cls:pnlClass(d.today_pnl)},
  ];
  document.getElementById('summaryCards').innerHTML=cards.map(c=>`<div class="card"><div class="card-label">${c.label}</div><div class="card-value ${c.cls||''}">${c.value}</div></div>`).join('');

  // Positions
  const pb=document.getElementById('posBody');
  pb.innerHTML=(d.positions||[]).map(p=>`<tr>
    <td>${p.name}</td><td>${p.symbol}</td><td>${p.shares}</td>
    <td>${fmt(p.avg_cost)}</td><td>${fmt(p.current_price)}</td>
    <td class="${pnlClass(p.pnl)}">${pnlSign(p.pnl)}${fmt(p.pnl)}</td>
    <td class="${pnlClass(p.pnl_pct)}">${pnlSign(p.pnl_pct)}${fmt(p.pnl_pct)}%</td>
  </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;color:var(--sub)">暂无持仓</td></tr>';

  // Gauge
  renderGauge(d.sentiment);
  updateTime();
}

function renderGauge(s){
  if(!s)return;
  const score=s.score||0;
  let color='#ffd166';
  if(score<=20)color='#e63946';
  else if(score<=40)color='#f4a261';
  else if(score<=60)color='#ffd166';
  else if(score<=80)color='#2ec4b6';
  else color='#9b2226';

  const ctx=document.getElementById('gaugeChart').getContext('2d');
  if(gaugeInst)gaugeInst.destroy();
  gaugeInst=new Chart(ctx,{
    type:'doughnut',
    data:{datasets:[{data:[score,100-score],backgroundColor:[color,'#e5e5ea'],borderWidth:0}]},
    options:{
      rotation:-90,circumference:180,cutout:'78%',
      plugins:{tooltip:{enabled:false},legend:{display:false}},
      responsive:true,maintainAspectRatio:true
    }
  });
  document.getElementById('gaugeScore').textContent=score;
  document.getElementById('gaugeScore').style.color=color;
  document.getElementById('gaugeLabel').textContent=s.label||'';
}

async function loadChart(){
  const d=await api('/api/finance/chart');
  if(!d||!d.dates)return;
  const ctx=document.getElementById('returnChart').getContext('2d');
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:d.dates,
      datasets:[{
        label:'总资产',data:d.values,
        borderColor:'#4361ee',backgroundColor:'rgba(67,97,238,.1)',
        fill:true,tension:.3,pointRadius:d.values.length>30?0:3,borderWidth:2
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{maxTicksLimit:8,font:{size:11}}},
        y:{grid:{color:'#e5e5ea'},ticks:{font:{size:11},callback:v=>v>=10000?(v/10000).toFixed(1)+'万':v}}
      }
    }
  });
}

// Analysis
// News
async function loadChangelog(){
  const d=await api('/api/finance/changelog');
  document.getElementById('changelogContent').innerHTML=d?marked.parse(d.content||'暂无'):'加载失败';
}

async function loadNews(){
  const el=document.getElementById('newsList');
  el.innerHTML='<div class="empty">加载中...</div>';
  const d=await api('/api/finance/news');
  const items=d?.news||[];
  if(!items.length){el.innerHTML='<div class="empty">暂无新闻</div>';return;}
  el.innerHTML=items.map(n=>`<div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start">
    <span style="font-size:11px;padding:3px 8px;border-radius:4px;background:var(--accent-bg);color:var(--accent);white-space:nowrap;flex-shrink:0">${n.source||'资讯'}</span>
    <div>
      <div style="font-size:14px;font-weight:500;margin-bottom:4px">${n.title}</div>
      <div style="font-size:12px;color:var(--sub);line-height:1.5">${(n.content||'').slice(0,120)}${n.content&&n.content.length>120?'...':''}</div>
      <div style="font-size:11px;color:var(--sub);margin-top:4px">${n.time||''} · ${n.keyword||''}</div>
    </div>
  </div>`).join('');
}

async function loadAnalysis(){
  const d=await api('/api/finance/analysis');
  if(!d)return;
  document.getElementById('analysisDate').textContent=d.date||'';
  document.getElementById('marketAnalysis').innerHTML=marked.parse(d.market_analysis||'暂无分析');
  document.getElementById('pickCards').innerHTML=(d.picks||[]).map(p=>`<div class="pick-card">
    <div><span class="name">${p.name}</span><span class="symbol">${p.symbol}</span><span class="conf">置信 ${p.confidence}/10</span></div>
    <div class="prices">
      <span><span class="lbl">买入价</span>${fmt(p.buy_price)}</span>
      <span><span class="lbl">目标价</span><span style="color:var(--up)">${fmt(p.target_price)}</span></span>
      <span><span class="lbl">止损价</span><span style="color:var(--down)">${fmt(p.stop_loss)}</span></span>
    </div>
    <div class="reason">${p.reason||''}</div>
  </div>`).join('')||'<p style="color:var(--sub)">暂无选股推荐</p>';
}

// Trades
async function loadTrades(){
  const d=await api('/api/finance/trades');
  tradesData=d?.trades||[];
  renderTrades();
}
function renderTrades(){
  const dir=document.getElementById('filterDir').value;
  const date=document.getElementById('filterDate').value;
  let list=tradesData;
  if(dir)list=list.filter(t=>t.direction===dir);
  if(date)list=list.filter(t=>t.trade_date===date);
  document.getElementById('tradeBody').innerHTML=list.map(t=>{
    const isBuy=t.direction==='BUY';
    return`<tr>
      <td>${t.trade_date}</td>
      <td style="color:${isBuy?'var(--up)':'var(--down)'}">${isBuy?'买入':'卖出'}</td>
      <td>${t.name}</td><td>${t.symbol}</td>
      <td>${fmt(t.price)}</td><td>${t.shares}</td><td>${fmt(t.amount)}</td><td>${fmt(t.commission)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(t.reason||'').replace(/"/g,'&quot;')}">${t.reason||''}</td>
    </tr>`;
  }).join('')||'<tr><td colspan="9" style="text-align:center;color:var(--sub)">暂无交易记录</td></tr>';
}

// Reports
async function loadReports(){
  const d=await api('/api/finance/reports');
  const list=d?.reports||[];
  document.getElementById('reportList').innerHTML=list.map(r=>`<div class="report-item" onclick="viewReport('${r.date}')">
    <span>📋 ${r.date}</span><span style="color:var(--sub);font-size:13px">${r.filename}</span>
  </div>`).join('')||'<p style="text-align:center;padding:40px;color:var(--sub)">暂无日报</p>';
}
async function viewReport(date){
  const d=await api('/api/finance/reports/'+date);
  if(!d)return;
  document.getElementById('modalContent').innerHTML=marked.parse(d.content||'');
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

// Run Analysis
async function runAnalysis(){
  const btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='⏳ 运行中...';
  const lp=document.getElementById('logPanel');
  const lb=document.getElementById('logBody');
  lp.classList.add('show');lb.textContent='正在启动分析...\n';

  await api('/api/finance/run',{method:'POST'});

  pollTimer=setInterval(async()=>{
    const d=await api('/api/finance/run/status');
    if(!d){return;}
    lb.textContent=d.log||'';
    lb.scrollTop=lb.scrollHeight;
    if(d.status==='done'||d.status==='error'){
      clearInterval(pollTimer);pollTimer=null;
      btn.disabled=false;btn.textContent='▶ 运行分析';
      lb.textContent+= d.status==='done'?'\n✅ 分析完成！':'\n❌ 分析出错';
      lb.scrollTop=lb.scrollHeight;
      if(d.status==='done')refreshAll();
    }
  },3000);
}
function closeLog(){
  document.getElementById('logPanel').classList.remove('show');
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
}

function updateTime(){
  document.getElementById('lastUpdate').textContent='更新: '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('statusDot').classList.remove('error');
}

async function refreshAll(){
  await Promise.all([loadDashboard(),loadChart(),loadAnalysis(),loadTrades(),loadReports()]);
}

// Init
refreshAll();
setInterval(refreshAll,300000);
</script>
</body>
</html>
