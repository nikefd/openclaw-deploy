<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU Task Scheduler</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e4e4e7;
  --dim: #71717a; --accent: #6366f1; --green: #22c55e; --red: #ef4444;
  --yellow: #eab308; --blue: #3b82f6;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
.header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

.stats-bar { display: flex; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; min-width: 120px; }
.stat .label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; }
.stat .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
.stat .value.green { color: var(--green); }
.stat .value.yellow { color: var(--yellow); }
.stat .value.red { color: var(--red); }
.stat .value.blue { color: var(--blue); }

.main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 24px; }
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

.panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.panel-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.panel-head h2 { font-size: 14px; font-weight: 600; }
.panel-body { padding: 12px; max-height: 400px; overflow-y: auto; }

.btn { border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-weight: 500; transition: .15s; }
.btn:hover { filter: brightness(1.15); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-warning { background: var(--yellow); color: #000; }
.btn-success { background: var(--green); color: #000; }
.btn-sm { padding: 3px 8px; font-size: 11px; }

.gpu-card, .user-card, .task-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
}
.gpu-card .icon { font-size: 20px; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; }
.badge-idle { background: #22c55e22; color: var(--green); }
.badge-busy { background: #6366f122; color: var(--accent); }
.badge-fault { background: #ef444422; color: var(--red); }
.badge-queued { background: #eab30822; color: var(--yellow); }
.badge-running { background: #3b82f622; color: var(--blue); }
.badge-completed { background: #22c55e22; color: var(--green); }
.badge-failed { background: #ef444422; color: var(--red); }
.badge-cancelled { background: #71717a22; color: var(--dim); }

.flex-1 { flex: 1; }
.name { font-weight: 600; font-size: 13px; }
.sub { font-size: 11px; color: var(--dim); }
.actions { display: flex; gap: 4px; }

.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

.modal-overlay { display: none; position: fixed; inset: 0; background: #000a; z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 360px; }
.modal h3 { margin-bottom: 16px; font-size: 16px; }
.modal input, .modal select { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; margin-bottom: 12px; }
.modal .btns { display: flex; gap: 8px; justify-content: flex-end; }

.log-panel .panel-body { font-family: 'SF Mono', monospace; font-size: 11px; }
.log-entry { padding: 3px 0; color: var(--dim); border-bottom: 1px solid var(--border); }
.log-entry .time { color: var(--accent); margin-right: 8px; }

.empty { text-align: center; padding: 24px; color: var(--dim); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="dot" id="connDot"></div>
  <h1>🖥️ GPU Task Scheduler</h1>
  <span style="color:var(--dim);font-size:12px" id="connStatus">Connecting...</span>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="main">
  <!-- GPU Panel -->
  <div class="panel">
    <div class="panel-head">
      <h2>🎮 GPU Resources</h2>
      <button class="btn btn-primary" onclick="showModal('gpu')">+ Add GPU</button>
    </div>
    <div class="panel-body" id="gpuList"></div>
  </div>

  <!-- Users Panel -->
  <div class="panel">
    <div class="panel-head">
      <h2>👥 Users</h2>
      <button class="btn btn-primary" onclick="showModal('user')">+ Add User</button>
    </div>
    <div class="panel-body" id="userList"></div>
  </div>

  <!-- Task Queue -->
  <div class="panel">
    <div class="panel-head">
      <h2>📋 Task Queue & Running</h2>
      <button class="btn btn-primary" onclick="showModal('task')">+ Submit Task</button>
    </div>
    <div class="panel-body" id="taskList"></div>
  </div>

  <!-- Log -->
  <div class="panel log-panel">
    <div class="panel-head"><h2>📜 Event Log</h2></div>
    <div class="panel-body" id="logList"></div>
  </div>
</div>

<!-- Task History (full width) -->
<div style="padding: 0 24px 24px;">
  <div class="panel">
    <div class="panel-head"><h2>📊 Task History</h2></div>
    <div class="panel-body" id="historyList" style="max-height:300px"></div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const API = location.origin + '/gpu-scheduler/api';
const WS_URL = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/gpu-scheduler/ws';
let state = { gpus: [], tasks: [], users: [], queue: [], log: [], stats: {} };
let ws;

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('connDot').style.background = 'var(--green)';
    document.getElementById('connStatus').textContent = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('connDot').style.background = 'var(--red)';
    document.getElementById('connStatus').textContent = 'Disconnected';
    setTimeout(connectWS, 2000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') { state = msg.data; render(); }
    else if (msg.type === 'update') { fetchState(); }
    else if (msg.type === 'progress') {
      const t = state.tasks.find(t => t.id === msg.data.task_id);
      if (t) { t.progress = msg.data.progress; render(); }
    }
  };
}

async function fetchState() {
  const r = await fetch(API + '/state');
  state = await r.json();
  render();
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

function render() {
  renderStats();
  renderGPUs();
  renderUsers();
  renderTasks();
  renderLog();
  renderHistory();
}

function renderStats() {
  const s = state.stats;
  document.getElementById('statsBar').innerHTML = [
    { l: 'Total GPUs', v: s.total_gpus, c: '' },
    { l: 'Idle', v: s.idle_gpus, c: 'green' },
    { l: 'Busy', v: s.busy_gpus, c: 'yellow' },
    { l: 'Fault', v: s.fault_gpus, c: 'red' },
    { l: 'Queued', v: s.queued_tasks, c: 'yellow' },
    { l: 'Running', v: s.running_tasks, c: 'blue' },
    { l: 'Completed', v: s.completed_tasks, c: 'green' },
    { l: 'Active Users', v: s.active_users, c: '' },
  ].map(x => `<div class="stat"><div class="label">${x.l}</div><div class="value ${x.c}">${x.v}</div></div>`).join('');
}

function renderGPUs() {
  const el = document.getElementById('gpuList');
  if (!state.gpus.length) { el.innerHTML = '<div class="empty">No GPUs added yet</div>'; return; }
  el.innerHTML = state.gpus.map(g => {
    const task = g.current_task ? state.tasks.find(t => t.id === g.current_task) : null;
    return `<div class="gpu-card">
      <div class="icon">🖥️</div>
      <div class="flex-1">
        <div class="name">${g.name} <span class="badge badge-${g.status}">${g.status}</span></div>
        <div class="sub">${task ? '▶ ' + task.name + ' (' + task.progress.toFixed(0) + '%)' : g.status === 'fault' ? '⚠️ Needs repair' : 'Available'}</div>
        ${task ? `<div class="progress-bar"><div class="fill" style="width:${task.progress}%"></div></div>` : ''}
      </div>
      <div class="actions">
        ${g.status === 'idle' || g.status === 'busy' ? `<button class="btn btn-warning btn-sm" onclick="faultGPU('${g.id}')">⚡Fault</button>` : ''}
        ${g.status === 'fault' ? `<button class="btn btn-success btn-sm" onclick="repairGPU('${g.id}')">🔧Repair</button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="removeGPU('${g.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderUsers() {
  const el = document.getElementById('userList');
  const active = state.users.filter(u => u.active);
  if (!active.length) { el.innerHTML = '<div class="empty">No active users</div>'; return; }
  el.innerHTML = active.map(u => {
    const taskCount = state.tasks.filter(t => t.user_id === u.id && (t.status === 'queued' || t.status === 'running')).length;
    return `<div class="user-card">
      <div class="icon" style="font-size:20px">👤</div>
      <div class="flex-1">
        <div class="name">${u.name}</div>
        <div class="sub">${taskCount} active task${taskCount !== 1 ? 's' : ''}</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary btn-sm" onclick="showModal('task','${u.id}')">+ Task</button>
        <button class="btn btn-danger btn-sm" onclick="removeUser('${u.id}')">Leave</button>
      </div>
    </div>`;
  }).join('');
}

function renderTasks() {
  const el = document.getElementById('taskList');
  const active = state.tasks.filter(t => t.status === 'queued' || t.status === 'running')
    .sort((a, b) => a.status === 'running' ? -1 : 1);
  if (!active.length) { el.innerHTML = '<div class="empty">No active tasks</div>'; return; }
  el.innerHTML = active.map(t => {
    const user = state.users.find(u => u.id === t.user_id);
    const gpu = t.gpu_id ? state.gpus.find(g => g.id === t.gpu_id) : null;
    return `<div class="task-card">
      <div class="flex-1">
        <div class="name">${t.name} <span class="badge badge-${t.status}">${t.status}</span></div>
        <div class="sub">${user?.name || '?'} · ${t.duration}s${gpu ? ' · GPU: ' + gpu.name : ' · Waiting...'}</div>
        ${t.status === 'running' ? `<div class="progress-bar"><div class="fill" style="width:${t.progress}%"></div></div>` : ''}
      </div>
      <div class="actions">
        <button class="btn btn-danger btn-sm" onclick="cancelTask('${t.id}')">Cancel</button>
      </div>
    </div>`;
  }).join('');
}

function renderHistory() {
  const el = document.getElementById('historyList');
  const done = state.tasks.filter(t => ['completed','failed','cancelled'].includes(t.status))
    .sort((a, b) => (b.finished_at || 0) - (a.finished_at || 0));
  if (!done.length) { el.innerHTML = '<div class="empty">No completed tasks yet</div>'; return; }
  el.innerHTML = done.slice(0, 50).map(t => {
    const user = state.users.find(u => u.id === t.user_id);
    const dur = t.finished_at && t.started_at ? (t.finished_at - t.started_at).toFixed(1) + 's' : '-';
    return `<div class="task-card">
      <div class="flex-1">
        <div class="name">${t.name} <span class="badge badge-${t.status}">${t.status}</span></div>
        <div class="sub">${user?.name || '?'} · Duration: ${dur}</div>
      </div>
    </div>`;
  }).join('');
}

function renderLog() {
  const el = document.getElementById('logList');
  el.innerHTML = state.log.slice().reverse().map(e => {
    const t = new Date(e.time * 1000).toLocaleTimeString();
    return `<div class="log-entry"><span class="time">${t}</span>${e.msg}</div>`;
  }).join('');
}

// Actions
async function removeGPU(id) { await api('DELETE', '/gpu/' + id); }
async function faultGPU(id) { await api('POST', '/gpu/' + id + '/fault'); }
async function repairGPU(id) { await api('POST', '/gpu/' + id + '/repair'); }
async function removeUser(id) { await api('DELETE', '/user/' + id); }
async function cancelTask(id) { await api('DELETE', '/task/' + id); }

// Modals
function showModal(type, userId) {
  const m = document.getElementById('modalContent');
  if (type === 'gpu') {
    m.innerHTML = `<h3>Add GPU</h3>
      <input id="gpuName" placeholder="GPU name (e.g. RTX-4090-1)" autofocus>
      <div class="btns"><button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAddGPU()">Add</button></div>`;
  } else if (type === 'user') {
    m.innerHTML = `<h3>Add User</h3>
      <input id="userName" placeholder="Username" autofocus>
      <div class="btns"><button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAddUser()">Join</button></div>`;
  } else if (type === 'task') {
    const active = state.users.filter(u => u.active);
    const sel = active.map(u => `<option value="${u.id}" ${u.id===userId?'selected':''}>${u.name}</option>`).join('');
    m.innerHTML = `<h3>Submit Task</h3>
      <select id="taskUser">${sel}</select>
      <input id="taskName" placeholder="Task name (e.g. Train ResNet)" autofocus>
      <input id="taskDur" type="number" value="15" min="3" max="120" placeholder="Duration (seconds)">
      <div class="btns"><button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doSubmitTask()">Submit</button></div>`;
  }
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => m.querySelector('input')?.focus(), 50);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

async function doAddGPU() {
  const name = document.getElementById('gpuName').value.trim() || 'GPU-' + Date.now().toString(36);
  await api('POST', '/gpu', { name }); closeModal();
}
async function doAddUser() {
  const name = document.getElementById('userName').value.trim() || 'User-' + Date.now().toString(36);
  await api('POST', '/user', { name }); closeModal();
}
async function doSubmitTask() {
  const user_id = document.getElementById('taskUser').value;
  const name = document.getElementById('taskName').value.trim() || 'Task-' + Date.now().toString(36);
  const duration = parseInt(document.getElementById('taskDur').value) || 15;
  await api('POST', '/task', { user_id, name, duration }); closeModal();
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('active')) {
    const btn = document.querySelector('.modal .btn-primary');
    if (btn) btn.click();
  }
  if (e.key === 'Escape') closeModal();
});

connectWS();
</script>
</body>
</html>
